<!-- Chapter 08 — playground. ONE instrument: the data, beautifully, on demand.
     ART-DIRECTION pass (Blue Marine / Moooi calibre):
       • ONE focal point — the divergence dial. Everything that competed for
         attention (the TGI panel, the segment portrait) is cut. A calm,
         precise instrument: pick a question, pick a Britain, the data resolves.
       • DRAMATIC hierarchy — one display moment: the live headline FIGURE for
         the current cut, at display scale, counts/morphs as you filter. The
         number IS the headline. Eyebrow + one line support it; nothing in the
         muddy middle.
       • ASYMMETRIC editorial split — a left instrument rail (eyebrow, the live
         read-out, the two controls) hangs on a left axis; the chart is the
         single hero on the open ground to its right. Not a centred stack.
       • ONE accent — teal, on the eyebrow + the active control + the live word.
       • ONE hero motion — the chart MORPHS (tugOfWar springs / bars re-sort /
         crossfade between viz types) and the figure counts. Everything else is
         quiet. Reduced-motion safe (JS jumps to rest).
       • Backgroundless — the chart sits transparently on the calm research
         ground; no white box, no gridlines, no chart-junk.
     Every number renders from the verified survey/segments files. No captions. -->
<div class="pg-world" data-pg-world>
  <!-- the orbit signature — a single thin ring, ambient, behind everything -->
  <span class="pg-orbit" aria-hidden="true"></span>

  <div class="chapter-inner pg-stage">
    <!-- ── LEFT: the instrument rail (controls + the live read-out) ── -->
    <div class="pg-rail">
      <p class="vccp-eyebrow pg-eyebrow" data-arrival>The appendix · the data on demand</p>

      <!-- The display moment: the live figure for the current cut. The number
           is the headline; it counts in on arrival and morphs on each filter. -->
      <div class="pg-readout" data-pg-readout>
        <p class="pg-readout-num" data-arrival>
          <span data-pg-readout-num>—</span><span class="pg-readout-unit" data-pg-readout-unit></span>
        </p>
        <p class="pg-readout-line" data-arrival><span data-pg-readout-line>Pick a question, then a Britain.</span></p>
      </div>

      <div class="pg-controls">
        <div class="pg-control">
          <span class="pg-control-label" id="pg-metric-label">The question</span>
          <div data-pg-metric-pills aria-describedby="pg-metric-label"></div>
        </div>
        <div class="pg-control">
          <span class="pg-control-label" id="pg-segment-label">Which Britain</span>
          <div data-pg-segment-pills aria-describedby="pg-segment-label"></div>
        </div>
      </div>

      <p class="pg-note" data-pg-note role="status" aria-live="polite"></p>
    </div>

    <!-- ── RIGHT: the single hero — the chart, box-less, on the open ground ── -->
    <div class="pg-instrument" data-youdot-anchor>
      <div class="chart-holder pg-chart-holder">
        <div class="pg-chart" data-pg-metric-chart></div>
      </div>
    </div>
  </div>
</div>
