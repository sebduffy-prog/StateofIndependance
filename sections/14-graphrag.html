<div class="chapter-inner graphrag-root on-navy" data-graphrag-root>

  <!-- GraphRAG explorer — the living segment network + the full survey.
       Navy full-bleed ground. TOP: title cluster + legend + the survey-question
       explorer (every survey question, by audience). CENTRE: the force-graph
       explorer (js/lib/segment-graph.js) given the lion's share of the stage —
       click a segment to see what it over-indexes on; click a statement to see
       who shares it. BOTTOM: the four audience profiles as a short, wide strip.
       Square corners, no underlines, no parallelogram, tabular nums. -->

  <span class="graphrag-orbit" aria-hidden="true"></span>

  <img class="graphrag-mark"
       src="assets/brand-final/challenger-series-lockup.png"
       alt="" aria-hidden="true" />

  <div class="graphrag-layout">

    <!-- ── TOP BAND: title + legend + survey-question explorer ───────────── -->
    <header class="graphrag-top">
      <div class="graphrag-head">
        <p class="vccp-eyebrow graphrag-eyebrow" data-arrival>The living network</p>
        <h2 class="graphrag-title si-display si-display--black" data-arrival>
          Explore the <em class="graphrag-accent" data-arrival-scramble>segments</em>
        </h2>
        <ul class="graphrag-keys" data-arrival>
          <li><span class="gk-swatch gk-architects"></span>Architects · 17%</li>
          <li><span class="gk-swatch gk-hustlers"></span>Hustlers · 28%</li>
          <li><span class="gk-swatch gk-coasters"></span>Coasters · 27%</li>
          <li><span class="gk-swatch gk-retreaters"></span>Retreaters · 28%</li>
        </ul>
      </div>

      <!-- The survey-question explorer — EVERY survey question, by audience.
           A labelled selector drives the per-audience comparison beneath it. -->
      <div class="graphrag-survey" data-graphrag-survey data-arrival>
        <div class="gs-control">
          <label class="gs-label" for="gs-question">Every survey question</label>
          <select class="gs-select" id="gs-question" data-gs-select aria-label="Choose a survey question to compare across the four audiences"></select>
        </div>
        <p class="gs-measure" data-gs-measure></p>
        <div class="gs-table" data-gs-table role="table" aria-label="Per-audience survey answers"></div>
      </div>
    </header>

    <!-- ── CENTRE: the graph stage — given the most of the viewport ──────── -->
    <div class="graphrag-stage" data-graphrag-mount>
      <p class="graphrag-fallback-msg" data-graphrag-msg hidden>
        Segment data is loading. The explorer will appear here.
      </p>
    </div>

    <!-- ── BOTTOM: the four audience profiles — short and wide ───────────── -->
    <div class="graphrag-profiles" data-graphrag-panel>
      <p class="graphrag-profiles-hint">
        The network cycles through each segment on its own. Tap a segment to hold
        it, tap a signal to see who shares it.
      </p>
    </div>

  </div>
</div>
