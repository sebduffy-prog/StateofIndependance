<div class="chapter-inner">
  <!-- 01 — COVER. The one memorable thing: the maze + orbit + the you-dot born.
       The signature deck illustration (the isometric maze, the navy bear, the
       figure at the maze mouth, a teal orbit ring sweeping it) is the hero,
       used with reverence, once, big — on a vast warm field. The wordmark hangs
       on a left axis in enormous negative space; one display moment, one accent.

       MARQUEE — the you-dot is born. A single cream dot blooms at the maze mouth
       (where the figure stands) and the visitor drags / arrow-keys it INTO the
       maze along one clean ink trail toward the heart. Starting = taking control.
       On arrival the journey is ready and Begin wakes. Next always unlocks after
       the dwell; the trace is the reward, never a block. Reduced-motion swaps the
       GIF for its poster and pre-draws the trail to its final state.

       Cut from the prior build (competing elements, §0/§8): the second hand-drawn
       SVG orbit ring (the asset already orbits), the control-gauge rail, the
       ambient dot-field (it fought the bear), the floating respondent you-line
       (STORY: no stats on the cover) and the maze bob. One focal point only. -->
  <div class="cover si-ground-warm" data-cover-root data-cover-hero>

    <!-- LEFT — the wordmark, hung on a left axis in open space. -->
    <header class="cover-copy" data-stagger="120">
      <p class="vccp-eyebrow cover-kicker" data-arrival>The Challenger Series · VCCP</p>

      <h1 class="cover-wordmark si-display">
        <span class="cover-line" data-arrival>The state of</span>
        <span class="cover-line cover-em hl" data-arrival data-arrival-scramble>independence</span>
      </h1>

      <p class="cover-standfirst si-measure" data-arrival>
        Britain has stopped waiting to be rescued — and is taking back control.
      </p>

      <button type="button" class="cover-cue" data-arrival data-cover-cue
              data-cursor aria-label="Begin the journey">
        <span class="cover-cue-label">Begin</span>
        <span class="cover-cue-arrow" aria-hidden="true"></span>
      </button>
    </header>

    <!-- RIGHT — the maze logo-moment. The whole illustration is inert except the
         one cream "you" dot that is born at the maze mouth and traces inward. -->
    <figure class="cover-stage" data-cover-stage>
      <img class="cover-maze" data-cover-maze
           src="assets/deck/maze-hero.gif"
           data-still="assets/deck/maze-hero.png"
           alt="An isometric maze with a navy bear inside and a small figure at its entrance, a teal orbit ring sweeping around it"
           width="800" height="800" loading="eager" decoding="async" />

      <!-- TRACE overlay, in the illustration's own 800×800 user space: a faint
           guide from the maze mouth to its heart, the ink that draws in behind
           the dot, and the goal at the centre. Pointer-inert; the handle owns it. -->
      <svg class="cover-trace" data-cover-trace viewBox="0 0 800 800"
           preserveAspectRatio="xMidYMid meet" focusable="false" aria-hidden="true">
        <path class="cover-trace-guide" data-cover-path
              d="M 554 488 C 512 452 488 430 470 392 C 452 354 486 338 470 300" />
        <path class="cover-trace-ink" data-cover-ink
              d="M 554 488 C 512 452 488 430 470 392 C 452 354 486 338 470 300" />
        <circle class="cover-trace-goal" data-cover-goal cx="470" cy="300" r="7" />
      </svg>

      <!-- The cream "you" dot, born at the maze mouth. The youDot anchor rides it
           so the global marker is seeded here for the whole journey. -->
      <button type="button" class="cover-handle" data-cover-handle data-cursor
              aria-label="Trace a path into the maze to take control">
        <span class="cover-handle-halo" aria-hidden="true"></span>
        <span class="cover-handle-dot" data-youdot-anchor aria-hidden="true"></span>
      </button>
    </figure>

  </div>
</div>
