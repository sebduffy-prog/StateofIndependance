<div class="chapter-inner">
  <!-- 01 — COVER. The authoritative brand world: the warm-gradient ground, the
       Challenger-Series lockup as the brand signature, a huge BOLD BLACK Poppins-900
       title with ONE italic accent word ("Independence"), and the State of
       Independence MAZE logo-moment (assets/brand-final/maze-logo.gif) used once,
       big, on vast negative space. No hero box; the ground breathes.

       MARQUEE — the "you" dot is born. A single cream dot blooms at the maze mouth
       (where the small figure stands, bottom-right of the maze) and the visitor
       drags / arrow-keys it INTO the maze along one clean ink trail toward its
       heart. Starting = taking control. On arrival the journey is ready and Begin
       wakes with the single yellow accent ring. Next always unlocks after the dwell;
       the trace is the reward, never a block. Reduced-motion swaps the GIF for its
       static first-frame poster and pre-draws the trail to its final state.

       One focal point only (the maze). The lockup is the signature, the title is the
       voice, the maze is the hero. Italic accent replaces the old orange highlight
       (BWF §2): the slant of the italic IS the accent — no box, no underline, no skew. -->
  <div class="cover si-ground-warm" data-cover-root data-cover-hero>

    <!-- LEFT — the brand signature (lockup) → the display title → standfirst →
         the Begin cue, hung on a left axis in open space. -->
    <header class="cover-copy" data-stagger="120">
      <img class="cover-lockup si-lockup si-lockup--hero" data-arrival
           src="assets/brand-final/challenger-series-lockup.png"

           width="688" height="245" loading="eager" decoding="async" />

      <p class="cover-kicker vccp-eyebrow" data-arrival>Britain 2026</p>

      <h1 class="cover-wordmark si-display si-display--black">

        <span class="cover-line cover-em si-accent" data-arrival data-arrival-scramble>Independence</span>

      <p class="cover-standfirst si-measure" data-arrival>
        Britain has stopped waiting to be rescued. A nationwide study of how people are taking back control, and what that demands of every brand that serves them.

      <!-- The cream "you" dot, born at the maze mouth. The youDot anchor rides it
           so the global marker is seeded here for the whole journey. -->
