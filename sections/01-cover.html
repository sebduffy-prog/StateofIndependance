<div class="chapter-inner">
  <!-- 01 — COVER / HERO. The journey's single full-viewport opening beat; there
       is no top nav, so this hero fills the screen edge-to-edge above the bottom
       controls. A warm gold→orange gradient ground carries the signature deck
       MAZE motion logo (right) with a live teal orbit ring sweeping it; the
       wordmark assembles on the left in clear negative space; behind everything
       an ambient navy respondent dot-field drifts (the 1,504 we listened to).

       MARQUEE — TRACE-THE-MAZE (ungated reward): a cream "you" dot is BORN at
       the maze entrance with a halo, and the visitor drags / arrow-keys it along
       the path to the centre. Starting = taking control: an ink line draws in
       behind the dot, the orbit ring brightens + accelerates, a quiet control
       gauge fills, the respondent count settles, and on arrival the BEGIN button
       wakes with a commit pulse. Next always unlocks after the dwell; the trace
       is the reward, never a block. Reduced-motion pre-completes the inked path
       and swaps the GIF for its poster. -->
  <div class="cover-hero si-ground-warm" data-cover-root data-cover-hero data-parallax-x="0">

    <!-- Ambient respondent dot-field — navy on warm, well behind the copy. -->
    <div class="cover-field" data-cover-dots aria-hidden="true"></div>

    <!-- LEFT: the wordmark + standfirst, hung in clear negative space. -->
    <div class="cover-copy" data-stagger="120">
      <p class="vccp-eyebrow cover-kicker" data-arrival>
        <img class="cover-kicker-glyph" src="assets/deck/figure-silhouette.png"
             alt="" aria-hidden="true" width="14" height="44" />
        <span>The Challenger Series · VCCP</span>
      </p>

      <h1 class="cover-wordmark si-display">
        <span class="cover-line" data-arrival>The state of</span>
        <span class="cover-line cover-em hl" data-cover-hl data-arrival data-arrival-scramble>independence</span>
      </h1>

      <p class="cover-standfirst si-measure" data-arrival>
        Britain has stopped waiting to be rescued. A nationwide study of how
        people are taking back control — and what it demands of every brand
        that serves them.
      </p>

      <!-- Primary CTA: a magnetic navy button (wired in JS). Quiet until the
           trace completes, then it wakes with a commit pulse and invites Begin. -->
      <button type="button" class="cover-cue" data-arrival data-cover-cue
              data-cursor aria-label="Begin the journey">
        <span class="cover-cue-label">Begin</span>
        <span class="cover-cue-arrow" aria-hidden="true"></span>
      </button>

      <!-- Quiet respondent marker — the number counts up on arrival; the prompt
           label resolves once the visitor has traced control. -->
      <p class="cover-you" data-cover-you aria-live="polite">
        <span class="cover-you-mark" aria-hidden="true"></span>
        <span class="cover-you-label" data-cover-you-label>
          You are respondent
          <span class="cover-you-num" data-arrival-count data-to="1505">1505</span>
          of 1,504 we listened to.
        </span>
      </p>
    </div>

    <!-- RIGHT: the maze motion logo, a live orbit ring, and the trace layer.
         The whole stage is inert except the one draggable handle. -->
    <div class="cover-stage" data-cover-stage data-parallax="0.05">

      <!-- Live teal orbit ring — the single bright accent, sweeping the maze.
           Responds to the trace via the --trace custom property on the stage. -->
      <svg class="cover-orbit" data-cover-orbit viewBox="0 0 600 600"
           preserveAspectRatio="xMidYMid meet" focusable="false" aria-hidden="true">
        <ellipse class="cover-orbit-ring cover-orbit-ring--faint" cx="300" cy="300"
                 rx="268" ry="158" transform="rotate(-22 300 300)" />
        <ellipse class="cover-orbit-ring" cx="300" cy="300" rx="268" ry="158"
                 transform="rotate(-22 300 300)" />
        <circle class="cover-orbit-bead" r="8" />
      </svg>

      <!-- The maze motion logo (decorative). Reduced-motion swaps to the poster. -->
      <div class="cover-maze" aria-hidden="true">
        <img class="cover-maze-img" data-cover-maze
             src="assets/deck/maze-hero.gif"
             data-still="assets/deck/maze-hero.png"
             alt="" width="800" height="800" loading="eager" decoding="async" />
      </div>

      <!-- TRACE overlay: faint dotted guide + the ink that draws in with
           progress + a goal node that pulses until reached. -->
      <svg class="cover-trace" data-cover-trace viewBox="0 0 600 600"
           preserveAspectRatio="xMidYMid meet" focusable="false" aria-hidden="true">
        <path class="cover-trace-guide" data-cover-path
              d="M 472 488 C 470 444 470 426 428 410 C 386 393 372 408 360 370 C 348 332 386 320 350 298 C 316 277 266 300 254 266 C 244 238 286 224 300 200" />
        <path class="cover-trace-ink" data-cover-ink
              d="M 472 488 C 470 444 470 426 428 410 C 386 393 372 408 360 370 C 348 332 386 320 350 298 C 316 277 266 300 254 266 C 244 238 286 224 300 200" />
        <circle class="cover-trace-goal" data-cover-goal cx="300" cy="200" r="6" />
      </svg>

      <!-- The draggable cream "you" dot, born at the maze entrance with a halo.
           The youDot anchor rides with it so the global marker tracks the trace. -->
      <button type="button" class="cover-handle" data-cover-handle data-cursor
              aria-label="Trace a path through the maze to take control">
        <span class="cover-handle-halo" aria-hidden="true"></span>
        <span class="cover-handle-dot" data-youdot-anchor aria-hidden="true"></span>
      </button>

      <!-- Quiet control gauge: a thin rail that fills as the trace advances. -->
      <p class="cover-prompt" data-cover-prompt aria-hidden="true">
        <span class="cover-prompt-label" data-cover-prompt-label>Trace your way out</span>
      </p>
    </div>

  </div>
</div>
