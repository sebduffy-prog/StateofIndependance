<!-- Chapter 06 — the empowerment architecture.
     THE ONE MEMORABLE THING (per ART-DIRECTION §7): three needs you pull
     together until they meet on empowerment. Tactile, elemental, lots of space.

     Composition is deliberately ONE focal point — the marquee venn. Everything
     else is a quiet prelude that leads the eye to it:
       · A short asymmetric hero line that hangs on the left axis. One display
         moment per screen (Poppins 900); the standfirst is the small thing.
       · The pivot wipe is a thin cinematic line — survival mode wipes to active
         agency on one strip. It frames WHY the screen exists; it does not
         compete (no cross-fading art, no dual copy stacks, no second display).
       · The venn IS the screen: three flat brand circles (money / time / stress)
         held wide apart on the open ground; the visitor DRAGS them together and
         the word "empowerment" assembles in the shared core. The three verified
         Q14 values read inline at each need — data as a reality, not a chart.
         The "you" dot lands on the resolved core.

     Backgroundless throughout: every line, circle and number sits on the warm
     gradient ground with COLOUR + WEIGHT emphasis only — no white boxes, no
     scrim plates, no pills. Square corners, AA contrast, tabular nums, no
     underline, no skew. Reduced-motion safe, keyboard paths. Single root. -->
<div class="chapter-inner emp-root on-warm" data-emp-root>

  <!-- Decorative orbit — the connective signature, behind everything, no meaning. -->
  <div class="emp-orbit si-orbit si-orbit--spin" aria-hidden="true" data-parallax="0.04"></div>

  <!-- HERO — one display moment, hangs left, generous space. The standfirst is
       the deliberately small thing (dramatic hierarchy, nothing muddy-middle). -->
  <header class="emp-head">
    <p class="vccp-eyebrow emp-eyebrow" data-arrival>The empowerment architecture</p>
    <h2 class="si-display si-display--lg emp-title" data-arrival>
      One need unifies<br>them all
    </h2>
    <p class="emp-standfirst si-measure" data-arrival>
      Money is the obvious ask. Saving people time and stress holds far more
      premium value than brands realise. Pull the three together.
    </p>

    <!-- The pivot wipe — a single thin strip, not a beat. Survival mode wipes
         to active agency as the visitor scrubs it. One line of copy at a time
         (the off side is clipped, never stacked). -->
    <div class="emp-pivot" data-emp-pivot data-arrival>
      <span class="emp-pivot-readout" data-side="before" aria-live="polite">
        <span class="emp-pivot-word emp-pivot-word--before">Survival mode</span>
        <span class="emp-pivot-word emp-pivot-word--after">Active agency</span>
      </span>
      <span class="emp-pivot-track" data-emp-pivot-track>
        <span class="emp-pivot-fill" data-emp-pivot-fill aria-hidden="true"></span>
        <input type="range" class="emp-pivot-slider" min="0" max="100" value="14"
               aria-label="Scrub from survival mode to active agency" />
      </span>
    </div>
  </header>

  <!-- THE MARQUEE — the focal point. Three needs converge on empowerment.
       The venn stage + inline-valued legend are built in JS into this mount.
       The "you" dot anchors on the resolved core. -->
  <section class="emp-venn" aria-labelledby="emp-venn-title">
    <h3 class="si-display si-display--sm emp-venn-title" id="emp-venn-title" data-arrival>
      Bring the three together
    </h3>
    <div class="emp-venn-mount" data-emp-venn></div>
  </section>

</div>
