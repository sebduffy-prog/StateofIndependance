<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#041654" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Unplug them from the grid: plug pulled from a socket">
  <!-- wall socket (the grid) on the left -->
  <rect x="6" y="20" width="18" height="24" rx="2"/>
  <line x1="14" y1="28" x2="14" y2="33"/>
  <line x1="18" y1="28" x2="18" y2="33"/>
  <!-- plug pulled away to the right, prongs exposed and reaching back -->
  <line x1="40" y1="28" x2="32" y2="28"/>
  <line x1="40" y1="36" x2="32" y2="36"/>
  <path d="M40 22 h8 a4 4 0 0 1 4 4 v12 a4 4 0 0 1 -4 4 h-8 Z"/>
  <!-- cable trailing free -->
  <path d="M52 32 q8 1 6 10"/>
  <!-- disconnect gap mark -->
  <path d="M27 27 L29 32 L27 37"/>
</svg>
